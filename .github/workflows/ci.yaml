name: CI

on:
  workflow_dispatch:
  pull_request:
  merge_group:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

permissions:
  contents: read

# Nix is installed with nix-quick-install-action. The shared Cachix warms jobs
# before builds begin, while cache-nix-action preserves the Nix store for the
# full development-shell jobs. Cachix remains optional so fork PRs without the
# org token still build against cache.nixos.org.

jobs:
  cargo:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: check
            command: cargo check --workspace --all-targets --all-features
          - name: test
            command: cargo nextest run --workspace --all-features --all-targets
          - name: clippy
            command: cargo clippy --workspace --all-targets --all-features
          - name: fmt
            command: cargo fmt --all -- --check
    env:
      CARGO_INCREMENTAL: "0"

    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: nixbuild/nix-quick-install-action@2c9db80fb984ceb1bcaa77cdda3fdf8cfba92035  # v34
        with:
          nix_version: "2.31.2"
          nix_conf: |
            accept-flake-config = true
            fallback = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            keep-env-derivations = true
            keep-outputs = true

      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71  # v17
        continue-on-error: true
        with:
          name: data-cartel-public
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569  # v7
        with:
          primary-key: nix-${{ runner.os }}-cargo-${{ matrix.name }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-cargo-${{ matrix.name }}-
          gc-max-store-size-linux: 5G

      - name: Cache cargo artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: |
            ~/.cargo/git/db/
            ~/.cargo/registry/cache/
            ~/.cargo/registry/index/
            target/
          key: cargo-${{ runner.os }}-${{ matrix.name }}-${{ hashFiles('Cargo.lock', '**/Cargo.toml', 'flake.lock', 'flake.nix') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ matrix.name }}-

      - name: ${{ matrix.name }}
        run: nix develop -c ${{ matrix.command }}

  examples:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      CARGO_INCREMENTAL: "0"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: nixbuild/nix-quick-install-action@2c9db80fb984ceb1bcaa77cdda3fdf8cfba92035  # v34
        with:
          nix_version: "2.31.2"
          nix_conf: |
            accept-flake-config = true
            fallback = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71  # v17
        continue-on-error: true
        with:
          name: data-cartel-public
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Cache cargo artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: |
            ~/.cargo/git/db/
            ~/.cargo/registry/cache/
            ~/.cargo/registry/index/
            target/
          key: >-
            examples-${{ runner.os }}-${{
              hashFiles(
                '.cargo/config.toml',
                '**/Cargo.lock',
                '**/Cargo.toml',
                'flake.lock',
                'flake.nix',
                'scripts/check-examples.nu'
              )
            }}
          restore-keys: |
            examples-${{ runner.os }}-

      - name: examples
        run: nix run .#check-examples

  hooks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: nixbuild/nix-quick-install-action@2c9db80fb984ceb1bcaa77cdda3fdf8cfba92035  # v34
        with:
          nix_version: "2.31.2"
          nix_conf: |
            accept-flake-config = true
            fallback = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            keep-env-derivations = true
            keep-outputs = true

      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71  # v17
        continue-on-error: true
        with:
          name: data-cartel-public
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569  # v7
        with:
          primary-key: nix-${{ runner.os }}-hooks-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-hooks-
          gc-max-store-size-linux: 5G

      - name: prek hooks
        run: nix develop -c prek run --all-files
